# GitHub Pages: https://docs.github.com/en/pages
# Custom Actions workflow: https://docs.github.com/en/pages/getting-started-with-github-pages/using-custom-workflows-with-github-pages
# 404 / broken links: https://docs.github.com/en/pages/getting-started-with-github-pages/troubleshooting-404-errors-for-github-pages-sites
name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: nebulous-nadir/package-lock.json

      # Astro `base` / `site` must match how GitHub Pages actually serves the site. We read that from
      # actions/configure-pages outputs (base_path, base_url) so it stays correct for:
      #   - https://<owner>.github.io/<repo>/  → base_path like "/<repo>"
      #   - custom domain at site root         → base_path ""
      # Wrong BASE_PATH → home loads but section tabs 404 (absolute links hit the domain root).
      #
      # Optional repo Variables (Settings → Actions → Variables) to override detection:
      #   PAGES_BASE_PATH — force Astro base, e.g. / or /MyRepo/
      #   PAGES_SITE_URL — force canonical site URL (trailing slash added in build)
      - name: Install and build
        working-directory: nebulous-nadir
        env:
          BASE_PATH: ${{ vars.PAGES_BASE_PATH != '' && vars.PAGES_BASE_PATH || (steps.pages.outputs.base_path == '' && '/' || format('{0}/', steps.pages.outputs.base_path)) }}
          SITE_URL: ${{ vars.PAGES_SITE_URL != '' && vars.PAGES_SITE_URL || format('{0}/', steps.pages.outputs.base_url) }}
        run: npm ci && npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: nebulous-nadir/dist

  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
