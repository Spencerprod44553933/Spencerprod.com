# GitHub Pages: https://docs.github.com/en/pages
# Astro + Pages: https://docs.astro.build/en/guides/deploy/github/
# Node 20 deprecation: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Run JavaScript actions on Node 24 (covers nested upload-artifact inside withastro/action until it pins v6+).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      # Custom domain (e.g. spencerprod.com): configure-pages yields base_path "" → BASE_PATH "/".
      # Project URL (github.io/repo): base_path "/RepoName" → Astro base "/RepoName/".
      # Optional repo Variables → Actions → Variables: PAGES_BASE_PATH, PAGES_SITE_URL
      - name: Install, build, and upload artifact
        uses: withastro/action@v5.2.0
        with:
          path: nebulous-nadir
          node-version: 22
        env:
          BASE_PATH: ${{ vars.PAGES_BASE_PATH != '' && vars.PAGES_BASE_PATH || (steps.pages.outputs.base_path == '' && '/' || format('{0}/', steps.pages.outputs.base_path)) }}
          SITE_URL: ${{ vars.PAGES_SITE_URL != '' && vars.PAGES_SITE_URL || format('{0}/', steps.pages.outputs.base_url) }}

  deploy:
    env:
      # Ensures deploy-pages runs on Node 24 even if workflow-level env is skipped in edge cases.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # v5.0.0 = Node 24 (not v4 / Node 20). Pin minor to avoid surprise tag moves.
        uses: actions/deploy-pages@v5.0.0
