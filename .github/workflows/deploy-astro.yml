name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: nebulous-nadir/package-lock.json

      # BASE_PATH must match the URL path where the site is served (Astro `base`):
      # - Custom domain at domain root (e.g. https://spencerprod.com/) → BASE_PATH=/
      # - Project Pages default URL → https://<owner>.github.io/<repo>/ → BASE_PATH=/<repo>/
      #
      # If BASE_PATH is wrong, the home page may load but every nav link 404s (e.g. /cyber/ instead of /RepoName/cyber/).
      #
      # Repo Variables (Settings → Secrets and variables → Actions → Variables), optional overrides:
      #   PAGES_SITE_URL — e.g. https://spencerprod.com (when set, we default BASE_PATH to / unless you set PAGES_BASE_PATH)
      #   PAGES_BASE_PATH — force base, e.g. / or /YourRepoName/
      - name: Install and build
        working-directory: nebulous-nadir
        env:
          BASE_PATH: ${{ vars.PAGES_BASE_PATH != '' && vars.PAGES_BASE_PATH || (vars.PAGES_SITE_URL != '' && '/') || format('/{0}/', github.event.repository.name) }}
          SITE_URL: ${{ vars.PAGES_SITE_URL || format('https://{0}.github.io/{1}/', github.repository_owner, github.event.repository.name) }}
        run: npm ci && npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: nebulous-nadir/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
