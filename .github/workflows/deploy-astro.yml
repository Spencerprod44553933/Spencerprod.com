name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: nebulous-nadir/package-lock.json

      # BASE_PATH must match where the browser loads the site from:
      # - Custom domain (e.g. spencerprod.com) → site is at DOMAIN ROOT → use BASE_PATH=/
      # - Default only: https://<owner>.github.io/<repo>/ → set var PAGES_BASE_PATH=/<repo>/
      #
      # Repo Variables (Settings → Secrets and variables → Actions → Variables):
      #   PAGES_SITE_URL — required for custom domain: https://spencerprod.com (no trailing slash ok)
      #   PAGES_BASE_PATH — only if you use github.io URL without custom domain: /YourRepoName/
      - name: Install and build
        working-directory: nebulous-nadir
        env:
          BASE_PATH: ${{ vars.PAGES_BASE_PATH || '/' }}
          SITE_URL: ${{ vars.PAGES_SITE_URL || format('https://{0}.github.io/{1}/', github.repository_owner, github.event.repository.name) }}
        run: npm ci && npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: nebulous-nadir/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
