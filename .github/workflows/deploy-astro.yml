# GitHub Pages: https://docs.github.com/en/pages
# Astro + Pages: https://docs.astro.build/en/guides/deploy/github/
name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      # Custom domain (e.g. spencerprod.com): configure-pages yields base_path "" → BASE_PATH "/".
      # Project URL (github.io/repo): base_path "/RepoName" → Astro base "/RepoName/".
      # Optional repo Variables → Actions → Variables: PAGES_BASE_PATH, PAGES_SITE_URL
      - name: Install, build, and upload artifact
        uses: withastro/action@v5
        with:
          path: nebulous-nadir
          node-version: 22
        env:
          BASE_PATH: ${{ vars.PAGES_BASE_PATH != '' && vars.PAGES_BASE_PATH || (steps.pages.outputs.base_path == '' && '/' || format('{0}/', steps.pages.outputs.base_path)) }}
          SITE_URL: ${{ vars.PAGES_SITE_URL != '' && vars.PAGES_SITE_URL || format('{0}/', steps.pages.outputs.base_url) }}

  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
